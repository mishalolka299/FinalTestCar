name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Запускаємо базу даних PostgreSQL як сервіс (сховище) для запуску API та k6
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: autosalon
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore FinalTest.slnx
      
    - name: Build
      run: dotnet build FinalTest.slnx --no-restore
      
    - name: Run Unit, Database and Integration Tests
      # Testcontainers.PostgreSql всередині тестів (Integration та Database) автоматично 
      # підніматиме власні інстанси через Docker, оскільки він доступний на github runners.
      run: dotnet test FinalTest.slnx --no-build --verbosity normal
      
    - name: Start API for k6 tests
      run: |
        cd src/FinalTest.Api
        
        # Встановлюємо змінну середовища для підключення до сервісного контейнера PostgreSQL
        export ConnectionStrings__Default="Host=localhost;Port=5432;Database=autosalon;Username=postgres;Password=postgres"
        
        # Запускаємо API в бекграунді (через &), щоб k6 міг її тестувати
        dotnet run --no-build --urls "http://localhost:5202" &
        
        # Чекаємо поки API підніметься (максимум 30 секунд), намагаючись достукатись до ендпоінту
        echo "Waiting for API to start..."
        for i in {1..30}; do
          if curl -s http://localhost:5202/api/cars > /dev/null; then
            echo "API is up and running!"
            break
          fi
          echo "Waiting... $i/30"
          sleep 1
        done

    - name: Run k6 Load Test
      # Запускаємо k6 через готовий Docker контейнер, що надійно працює в CI
      run: docker run --network host -v ${{ github.workspace }}/k6:/work grafana/k6 run /work/load-test.js
      
    - name: Run k6 Stress Test
      run: docker run --network host -v ${{ github.workspace }}/k6:/work grafana/k6 run /work/stress-test.js
