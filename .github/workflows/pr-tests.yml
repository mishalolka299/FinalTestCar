name: PR Tests

on:
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FinalTest.slnx

      - name: Build
        run: dotnet build FinalTest.slnx --no-restore

      - name: Test
        run: dotnet test FinalTest.slnx --no-build --verbosity normal