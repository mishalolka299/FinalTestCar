name: k6 Performance Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  run-k6:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: autosalon
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup k6
      uses: grafana/setup-k6-action@v1
        
    - name: Restore dependencies
      run: dotnet restore src/FinalTest.Api/FinalTest.Api.csproj
      
    - name: Build API
      run: dotnet build src/FinalTest.Api/FinalTest.Api.csproj --no-restore
      
    - name: Start API
      env:
        ConnectionStrings__Default: "Host=localhost;Port=5432;Database=autosalon;Username=postgres;Password=postgres"
        ASPNETCORE_URLS: "http://localhost:5202"
      run: dotnet run --project src/FinalTest.Api/FinalTest.Api.csproj --no-build &
      
    - name: Wait for API to start
      run: |
        echo "Waiting for API to start..."
        for i in $(seq 1 30); do
          if curl -sf http://localhost:5202/api/cars > /dev/null 2>&1; then
            echo "API is up and running!"
            exit 0
          fi
          echo "  attempt $i/30..."
          sleep 2
        done
        echo "API failed to start within the given time"
        exit 1

    - name: Run k6 Load Test
      run: k6 run k6/load-test.js --summary-export=load-results.json
      
    - name: Run k6 Stress Test
      run: k6 run k6/stress-test.js --summary-export=stress-results.json

    - name: Upload k6 results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: k6-results
        path: |
          load-results.json
          stress-results.json